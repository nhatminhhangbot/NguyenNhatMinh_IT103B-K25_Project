<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống quẩn lý tài chính cá nhân - Đăng ký</title>
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>
    <div class="signup-box">
        <h3>Sign Up</h3>
        <p class="msg-success">Sign Up Successfully</p>
        <div class="input-group">
            <input type="email" class="register-email" placeholder="email here ...">
            <p class="error-message error-email">Please enter your email ...</p>
        </div>
        <div class="input-group">
            <input type="password" class="register-password" placeholder="Password here ...">
            <p class="error-message error-password">Please enter your password ...</p>
        </div>
        <div class="input-group">
            <input type="password" class="register-confirm-password" placeholder="Confirm password here ...">
            <p class="error-message error-confirm-password">Please enter your confirm password ...</p>
        </div>
        <button type="button" onclick="signUp()" class="btn-register">Sign Up</button>
        <p class="note">You have account? <a href="../pages/login.html">Sign In</a></p>
    </div>
    <script src="../js/register.js"></script>
</body>
</html>
